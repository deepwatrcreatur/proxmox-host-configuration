---
- name: Bootstrap Proxmox hosts with Determinate Nix and Home Manager
  hosts: proxmox
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/proxmox.yml

  handlers:
    - name: Restart nix-daemon
      ansible.builtin.systemd:
        name: nix-daemon
        state: restarted

  tasks:
    - name: Assert NixCI cache credentials are provided
      ansible.builtin.assert:
        that:
          - nix_ci_netrc | trim | length > 0
        fail_msg: >-
          Set nix_ci_netrc to a valid netrc stanza for cache.nix-ci.com before bootstrapping.

    - name: Ensure bootstrap packages are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
        state: present
        update_cache: true

    - name: Upgrade base Proxmox packages before Nix bootstrap
      ansible.builtin.apt:
        upgrade: dist

    - name: Check whether Nix is already installed
      ansible.builtin.stat:
        path: /nix
      register: nix_installation

    - name: Install Determinate Nix
      ansible.builtin.shell: |
        curl -fsSL https://install.determinate.systems/nix | sh -s -- install linux --no-confirm
      args:
        executable: /bin/bash
        creates: /nix
      when: not nix_installation.stat.exists

    - name: Upgrade Determinate Nix to the latest available release
      ansible.builtin.command: determinate-nixd upgrade
      register: determinate_upgrade
      changed_when: >
        'Upgrading Determinate Nix' in determinate_upgrade.stdout or
        'Upgrading Determinate Nixd' in determinate_upgrade.stdout
      failed_when: determinate_upgrade.rc != 0

    - name: Ensure Determinate Nix custom config is present
      ansible.builtin.copy:
        dest: /etc/nix/nix.custom.conf
        mode: "0644"
        content: |
          # Written by https://github.com/DeterminateSystems/nix-installer.
          # The contents below are based on options specified at installation time.
          substituters = {{ nix_substituters | join(' ') }}
          trusted-substituters = {{ nix_trusted_substituters | join(' ') }}
          trusted-public-keys = {{ nix_trusted_public_keys | join(' ') }}
      notify: Restart nix-daemon

    - name: Ensure root Nix config directory exists
      ansible.builtin.file:
        path: /root/.config/nix
        state: directory
        mode: "0700"

    - name: Seed root NixCI netrc snippet before Home Manager activation
      ansible.builtin.copy:
        dest: /root/.config/nix/nix-ci-netrc
        mode: "0600"
        content: |
          {{ nix_ci_netrc | trim }}

    - name: Flush nix-daemon restart handler before using nix
      ansible.builtin.meta: flush_handlers

    - name: Ensure flake checkout parent directory exists
      ansible.builtin.file:
        path: "{{ config_repo_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Check whether the config repo already exists
      ansible.builtin.stat:
        path: "{{ config_repo_path }}/.git"
      register: config_repo_git

    - name: Clone config repo when missing
      ansible.builtin.git:
        repo: "{{ config_repo_url }}"
        dest: "{{ config_repo_path }}"
        version: "{{ config_repo_branch }}"
        update: false
      when: not config_repo_git.stat.exists

    - name: Mark config repo as a safe git directory
      ansible.builtin.command:
        argv:
          - git
          - config
          - --global
          - --add
          - safe.directory
          - "{{ config_repo_path }}"
      changed_when: false

    - name: Pull latest config repo changes
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ config_repo_path }}"
          - pull
          - --ff-only
          - origin
          - "{{ config_repo_branch }}"
      register: git_pull
      changed_when: >
        'Already up to date.' not in git_pull.stdout and
        'Already up to date.' not in git_pull.stderr

    - name: Remove files that commonly block first Home Manager activation
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ conflicting_files + cleanup_files }}"
      failed_when: false

    - name: Activate Home Manager config for root
      ansible.builtin.shell: |
        set -euo pipefail
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        cd {{ config_repo_path }}
        nix run nixpkgs#home-manager -- switch --flake .#{{ home_manager_output }}
      args:
        executable: /bin/bash
      register: hm_activation
      changed_when: "'Starting Home Manager activation' in hm_activation.stdout"

    - name: Ensure root profile points to the Home Manager generation
      ansible.builtin.file:
        path: "{{ nix_profile_path }}"
        src: "{{ hm_profile_path }}"
        state: link
        force: true

    - name: Verify Nix version after bootstrap
      ansible.builtin.command: /nix/var/nix/profiles/default/bin/nix --version
      register: nix_version
      changed_when: false

    - name: Verify Home Manager is available
      ansible.builtin.command: /root/.nix-profile/bin/home-manager --version
      register: home_manager_version
      changed_when: false

    - name: Summarize bootstrap result
      ansible.builtin.debug:
        msg: |
          Host: {{ inventory_hostname }}
          Nix: {{ nix_version.stdout }}
          Home Manager: {{ home_manager_version.stdout }}
          Repo pull changed: {{ git_pull.changed }}
