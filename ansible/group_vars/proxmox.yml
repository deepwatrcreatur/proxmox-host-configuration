---
# Default variables for proxmox hosts
cache_build_server_host: attic-cache
cache_build_server_ip: 10.10.11.39
cache_build_server_port: 5001
cache_build_server_url: "http://{{ cache_build_server_host }}:{{ cache_build_server_port }}/cache-local"
cache_build_server_ip_url: "http://{{ cache_build_server_ip }}:{{ cache_build_server_port }}/cache-local"
nix_ci_cache_url: https://cache.nix-ci.com
nix_ci_trusted_public_key: nix-ci:g3xV5BDTLtIBZr/A00IU1x0EtKKlb7YLgBN2SgYgM6A=

nix_substituters:
  - "{{ cache_build_server_url }}"
  - "{{ cache_build_server_ip_url }}"
  - "{{ nix_ci_cache_url }}"
  - https://cache.nixos.org

nix_trusted_substituters:
  - "{{ cache_build_server_url }}"
  - "{{ cache_build_server_ip_url }}"
  - "{{ nix_ci_cache_url }}"
  - https://cache.nixos.org
  - https://cache.flakehub.com
  - https://install.determinate.systems

nix_trusted_public_keys:
  - cache-local:GozZz7XFsUZ7xI5o/Q36JA/BFfjzONWOjiqC+zAhp2g=
  - cache-local:63xryK76L6y/NphTP/iS63yiYqldoWvVlWI0N8rgvBw=
  - cache-local:92faFQnuzuYUJ4ta3EYpqIaCMIZGenDoaPktsBucTe4=
  - "{{ nix_ci_trusted_public_key }}"
  - cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

# Required netrc stanza for https://cache.nix-ci.com, for example:
# machine cache.nix-ci.com
# login <login>
# password <token>
nix_ci_netrc: ""

apt_cache_host: 10.10.11.42
apt_cache_port: 3142
apt_cache_url: "http://{{ apt_cache_host }}:{{ apt_cache_port }}"

determinate_nix_version: latest

# Profile paths for verification
nix_profile_path: /root/.nix-profile
hm_profile_path: /nix/var/nix/profiles/per-user/root/home-manager
system_profile_path: /nix/var/nix/profiles/per-user/root/profile

# Tools to verify
verify_tools:
  - atuin
  - fish
  - fnox

# Files to remove before home-manager activation (conflicts on fresh setup)
conflicting_files:
  - /root/.profile
  - /root/.bashrc
  - /root/.ssh/config

# Cleanup files to remove
cleanup_files:
  - /root/.nix-profile.backup
  - /root/.bashrc.backup
  - /root/.profile.backup

# Config cleanup files (old home-manager generated configs to remove)
config_cleanup_files:
  - /root/.bashrc
  - /root/.bash_profile
  - /root/.profile
