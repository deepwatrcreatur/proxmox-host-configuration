# Proxmox baseline for inference3.
# Plain OVMF only. Do not add efidisk0. Do not enable Secure Boot.
# Replace placeholder MAC, UUID, vmgenid, disk volume, and ISO as needed.

agent: 1
serial0: socket
bios: ovmf
boot: order=ide0;scsi0
cores: 8
cpu: host
ide0: local:iso/latest-nixos-graphical-x86_64-linux.iso,media=cdrom
machine: q35
memory: 46080
name: inference3
net0: virtio=BC:24:11:00:00:03,bridge=vmbr0
ostype: l26
scsi0: rpool-data:vm-<VMID>-disk-0,size=200G
scsihw: virtio-scsi-single
smbios1: uuid=00000000-0000-0000-0000-000000000103
sockets: 1
vmgenid: 00000000-0000-0000-0000-000000000203
