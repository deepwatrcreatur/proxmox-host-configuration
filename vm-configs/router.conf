# Proxmox baseline for router (VM 110).
#
# CPU: host passthrough (i7-6770 / Skylake, z170 board)
#   Exposes AVX2, AES-NI, CLMUL, SSE4.2 to the guest.
#   Benefits:
#     - WireGuard / Tailscale: kernel selects chacha-avx2 and poly1305-avx2
#       instead of the generic fallback — typically 2-4× faster ChaCha20.
#     - AES-NI: accelerates any TLS (Caddy, SSH) and AES-GCM cipher paths.
#     - CLMUL: hardware carry-less multiplication for AES-GCM authentication.
#   Trade-off: live migration to a host without AVX2 would fail; acceptable
#   for a dedicated always-on router that never migrates.
#
# PCIe passthrough:
#   hostpci0 (0000:03:00) and hostpci1 (0000:04:00) are NIC cards passed
#   through directly for full line-rate forwarding and WAN connectivity.
#
# Disks:
#   scsi0 (rpool-data, 65G) — OS / NixOS system
#   scsi1 (tank-z170, 200G) — log and data storage (ulogd flow logs, etc.)

agent: enabled=1
bios: ovmf
boot: order=scsi0
cores: 4
cpu: host
efidisk0: rpool-data:vm-110-disk-0,efitype=4m,size=1M
hostpci0: 0000:03:00
hostpci1: 0000:04:00
machine: q35
memory: 6144
meta: creation-qemu=10.0.2,ctime=1775037954
name: router
net0: virtio=BC:24:11:B5:6F:C3,bridge=vmbr0
onboot: 1
ostype: l26
scsi0: rpool-data:vm-110-disk-1,size=65G
scsi1: tank-z170:vm-110-disk-0,size=200G
scsihw: virtio-scsi-pci
serial0: socket
smbios1: uuid=eb5c046d-56db-45cd-ac1f-407bc70d8cb3
vga: serial0
vmgenid: 36c46010-1a75-407b-a8bd-acdcb37e040e
